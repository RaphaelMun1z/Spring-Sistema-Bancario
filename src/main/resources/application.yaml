server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  servlet:
    context-path: /api

spring:
  application:
    name: sistema-bancario
    profile: test

api:
  security:
    token:
      secret: ${JWT_SECRET:secret}

springdoc:
  pathsToMatch: /**
  swagger-ui:
    use-root-path: true

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  file:
    name: logs/logs-sistema-bancario.log
  level:
    root: INFO
    io.github.raphaelmun1z: DEBUG
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

cors:
  originPatterns: ${CORS_ORIGINS:http://localhost:4200}

