server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  servlet:
    context-path: /api

spring:
  application:
    name: sistema-bancario
  profiles:
    active: test

api:
  security:
    token:
      secret: ${JWT_SECRET:secret}

springdoc:
  pathsToMatch: /**
  swagger-ui:
    use-root-path: true

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: always

cors:
  originPatterns: ${CORS_ORIGINS:http://localhost:4200}

